<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java WASM Executor</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        #status {
            padding: 10px;
            margin-bottom: 10px;
            background: #252526;
            border-radius: 4px;
        }
        .ready { color: #4ec9b0; }
        .error { color: #f48771; }
    </style>
</head>
<body>
    <div id="status">Initializing Java executor...</div>
    
    <script>
        // Java 执行器 - 使用简化的解释器方法
        // 由于 CheerpJ 需要完整的 JDK 环境且文件较大，这里使用轻量级的方法
        
        let isReady = false;
        let inputData = "";
        
        // 初始化函数
        async function initJavaExecutor() {
            try {
                console.log("Initializing Java executor...");
                document.getElementById('status').innerHTML = 
                    '<span class="ready">✓ Java executor ready</span>';
                
                isReady = true;
                
                // 通知 Android 已就绪
                if (typeof AndroidBridge !== 'undefined') {
                    AndroidBridge.onJavaReady();
                }
            } catch (error) {
                console.error("Failed to initialize Java executor:", error);
                document.getElementById('status').innerHTML = 
                    '<span class="error">✗ Failed to initialize: ' + error.message + '</span>';
                
                if (typeof AndroidBridge !== 'undefined') {
                    AndroidBridge.onJavaError(error.toString());
                }
            }
        }
        
        // 编译并运行 Java 代码
        async function compileAndRunJava(code, input) {
            if (!isReady) {
                sendError("Executor not ready");
                return;
            }
            
            inputData = input;
            
            try {
                console.log("Compiling and running Java code...");
                
                // 验证代码包含 main 方法
                if (!code.includes('public static void main')) {
                    throw new Error("Code must contain: public static void main(String[] args)");
                }
                
                // 提取类名
                const classMatch = code.match(/public\s+class\s+(\w+)/);
                if (!classMatch) {
                    throw new Error("No public class found in code");
                }
                const className = classMatch[1];
                
                // 使用 eval 执行转换后的 JavaScript
                // 这是一个简化的 Java-to-JS 转换器
                const jsCode = transpileJavaToJS(code, className);
                
                // 创建隔离的执行环境
                const startTime = Date.now();
                await executeJavaScript(jsCode);
                const execTime = Date.now() - startTime;
                
                sendComplete(0);
                
            } catch (error) {
                console.error("Execution error:", error);
                sendError(error.toString());
                sendComplete(1);
            }
        }
        
        // 简化的 Java 到 JavaScript 转换器
        function transpileJavaToJS(javaCode, className) {
            let js = javaCode;
            
            // 移除 Java 特定的关键字和语法
            js = js.replace(/public\s+class\s+\w+\s*{/g, '');
            js = js.replace(/public\s+static\s+void\s+main\s*\(String\[\]\s+args\)\s*{/g, 
                'async function main() {');
            
            // 替换 System.out.println 为自定义输出
            js = js.replace(/System\.out\.println\s*\(/g, 'println(');
            js = js.replace(/System\.out\.print\s*\(/g, 'print(');
            
            // 替换 Scanner 输入
            js = js.replace(/Scanner\s+(\w+)\s*=\s*new\s+Scanner\(System\.in\);?/g, 
                'const $1 = new JavaScanner(inputData);');
            js = js.replace(/import\s+java\.util\.Scanner;?/g, '');
            js = js.replace(/import\s+java\.\w+\.\*;?/g, '');
            
            // 处理常见的 Java 类型声明
            js = js.replace(/\bint\s+/g, 'let ');
            js = js.replace(/\blong\s+/g, 'let ');
            js = js.replace(/\bdouble\s+/g, 'let ');
            js = js.replace(/\bfloat\s+/g, 'let ');
            js = js.replace(/\bboolean\s+/g, 'let ');
            js = js.replace(/\bString\s+/g, 'let ');
            js = js.replace(/\bchar\s+/g, 'let ');
            
            // 处理数组声明
            js = js.replace(/\bint\[\]/g, 'Array');
            js = js.replace(/\bString\[\]/g, 'Array');
            
            // 移除末尾的多余大括号
            js = js.replace(/}\s*$/, '');
            
            // 添加调用和必要的工具函数
            const wrapper = `
                // Java 运行时支持函数
                const output = [];
                
                function print(text) {
                    const str = String(text);
                    output.push(str);
                    if (typeof AndroidBridge !== 'undefined') {
                        AndroidBridge.onOutput(str);
                    }
                }
                
                function println(text) {
                    const str = String(text);
                    output.push(str + '\\n');
                    if (typeof AndroidBridge !== 'undefined') {
                        AndroidBridge.onOutput(str + '\\n');
                    }
                }
                
                // 简化的 Scanner 实现
                class JavaScanner {
                    constructor(inputData) {
                        this.lines = inputData.split('\\n');
                        this.currentLine = 0;
                        this.tokens = [];
                        this.currentToken = 0;
                    }
                    
                    hasNext() {
                        return this.currentLine < this.lines.length || 
                               this.currentToken < this.tokens.length;
                    }
                    
                    hasNextLine() {
                        return this.currentLine < this.lines.length;
                    }
                    
                    nextLine() {
                        if (this.currentLine < this.lines.length) {
                            return this.lines[this.currentLine++];
                        }
                        throw new Error("No more lines");
                    }
                    
                    next() {
                        if (this.tokens.length === 0 || this.currentToken >= this.tokens.length) {
                            if (this.currentLine < this.lines.length) {
                                this.tokens = this.lines[this.currentLine++].trim().split(/\\s+/);
                                this.currentToken = 0;
                            } else {
                                throw new Error("No more input");
                            }
                        }
                        return this.tokens[this.currentToken++];
                    }
                    
                    nextInt() {
                        return parseInt(this.next());
                    }
                    
                    nextDouble() {
                        return parseFloat(this.next());
                    }
                    
                    nextLong() {
                        return BigInt(this.next());
                    }
                    
                    nextBoolean() {
                        return this.next().toLowerCase() === 'true';
                    }
                }
                
                ${js}
                
                // 调用 main 函数
                await main();
            `;
            
            return wrapper;
        }
        
        // 执行 JavaScript 代码
        async function executeJavaScript(code) {
            try {
                // 使用 AsyncFunction 来支持 await
                const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
                const fn = new AsyncFunction('inputData', code);
                await fn(inputData);
            } catch (error) {
                throw error;
            }
        }
        
        // 发送输出到 Android
        function sendOutput(text) {
            if (typeof AndroidBridge !== 'undefined') {
                AndroidBridge.onOutput(text);
            }
        }
        
        // 发送错误到 Android
        function sendError(error) {
            if (typeof AndroidBridge !== 'undefined') {
                AndroidBridge.onError(error);
            }
        }
        
        // 发送完成通知到 Android
        function sendComplete(exitCode) {
            if (typeof AndroidBridge !== 'undefined') {
                AndroidBridge.onComplete(exitCode);
            }
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            setTimeout(initJavaExecutor, 100);
        });
        
        // 错误处理
        window.addEventListener('error', function(event) {
            console.error('Global error:', event.error);
            if (typeof AndroidBridge !== 'undefined') {
                AndroidBridge.onError(event.error?.toString() || 'Unknown error');
            }
        });
    </script>
</body>
</html>
