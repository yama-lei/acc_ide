<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM Python Executor</title>
    <!-- Pyodide CDN -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
</head>
<body>
    <div id="status">Loading Python...</div>
    
    <script>
        let pyodide = null;
        
        /**
         * 为 Python traceback 添加 ANSI 颜色代码
         * 使其显示效果与 C++ 编译器错误一致
         */
        function colorizeTraceback(errorStr) {
            // ANSI 颜色代码
            const RED = '\x1b[0;1;31m';      // 红色粗体（错误类型）
            const YELLOW = '\x1b[0;1;33m';   // 黄色粗体（文件路径）
            const CYAN = '\x1b[0;1;36m';     // 青色粗体（行号）
            const GREEN = '\x1b[0;1;32m';    // 绿色粗体（错误指示符 ^）
            const RESET = '\x1b[0m';         // 重置颜色
            
            let colored = errorStr;
            
            // 1. 高亮错误类型（SyntaxError, NameError, etc.）
            colored = colored.replace(
                /^(\w+Error):/gm, 
                RED + '$1:' + RESET
            );
            
            // 2. 高亮文件路径和行号 (File "...", line N)
            colored = colored.replace(
                /File "(.*?)", line (\d+)/g,
                'File ' + YELLOW + '"$1"' + RESET + ', line ' + CYAN + '$2' + RESET
            );
            
            // 3. 高亮 Traceback 标题
            colored = colored.replace(
                /^(Traceback \(most recent call last\):)/gm,
                CYAN + '$1' + RESET
            );
            
            // 4. 高亮错误指示符 (^)
            colored = colored.replace(
                /^(\s*\^+\s*)$/gm,
                GREEN + '$1' + RESET
            );
            
            return colored;
        }
        
        // 初始化Pyodide
        async function loadPyodideAndPackages() {
            try {
                console.log('Starting Pyodide initialization...');
                document.getElementById('status').textContent = 'Loading Pyodide...';
                
                pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"
                });
                
                console.log('Pyodide loaded, setting up output capture...');
                
                // 重定向stdout
                await pyodide.runPythonAsync(`
                    import sys
                    import io
                    
                    class OutputCapture:
                        def __init__(self):
                            self.output = []
                        
                        def write(self, text):
                            self.output.append(text)
                        
                        def flush(self):
                            pass
                        
                        def get_output(self):
                            return ''.join(self.output)
                    
                    _output_capture = OutputCapture()
                    sys.stdout = _output_capture
                    sys.stderr = _output_capture
                `);
                
                console.log('Pyodide ready, notifying Android...');
                document.getElementById('status').textContent = 'Python ready!';
                
                // 通知Android Pyodide已就绪
                if (typeof AndroidBridge !== 'undefined') {
                    AndroidBridge.onPyodideReady();
                } else {
                    console.error('AndroidBridge not found!');
                }
                
            } catch (error) {
                console.error('Failed to load Pyodide:', error);
                document.getElementById('status').textContent = 'Error: ' + error.message;
                
                if (typeof AndroidBridge !== 'undefined') {
                    AndroidBridge.onPyodideError(error.toString());
                } else {
                    console.error('AndroidBridge not found for error reporting!');
                }
            }
        }
        
        // 运行Python代码
        async function runPythonCode(code, input) {
            if (!pyodide) {
                AndroidBridge.onError('Pyodide not loaded');
                return;
            }
            
            try {
                document.getElementById('status').textContent = 'Running Python...';
                
                // 设置stdin（如果有输入）
                if (input) {
                    await pyodide.runPythonAsync(`
                        import sys
                        import io
                        sys.stdin = io.StringIO('''${input}''')
                    `);
                }
                
                // 清空之前的输出
                await pyodide.runPythonAsync(`
                    _output_capture.output = []
                `);
                
                // 执行用户代码
                try {
                    await pyodide.runPythonAsync(code);
                    
                    // 获取输出
                    const output = await pyodide.runPythonAsync(`
                        _output_capture.get_output()
                    `);
                    
                    document.getElementById('status').textContent = 'Done!';
                    AndroidBridge.onOutput(output || '');
                    AndroidBridge.onComplete(0);
                    
                } catch (pythonError) {
                    // Python执行错误
                    const errorOutput = await pyodide.runPythonAsync(`
                        _output_capture.get_output()
                    `);
                    
                    // 检测是否为编译时错误（语法错误）
                    const errorStr = pythonError.toString();
                    const isSyntaxError = errorStr.includes('SyntaxError') || 
                                         errorStr.includes('IndentationError') || 
                                         errorStr.includes('TabError');
                    
                    // 为错误信息添加 ANSI 颜色代码，与 C++ 编译器保持一致的显示效果
                    let errorMessage = errorOutput ? errorOutput + '\n' : '';
                    if (isSyntaxError) {
                        // 语法错误 = 编译错误（红色高亮）
                        errorMessage = '\x1b[0;1;31mCompilation Error:\x1b[0m\n' + 
                                      errorMessage + 
                                      colorizeTraceback(errorStr);
                    } else {
                        // 其他错误 = 运行时错误（红色高亮）
                        errorMessage = '\x1b[0;1;31mRuntime Error:\x1b[0m\n' + 
                                      errorMessage + 
                                      colorizeTraceback(errorStr);
                    }
                    
                    document.getElementById('status').textContent = 'Python Error';
                    AndroidBridge.onError(errorMessage);
                    // 不调用 onComplete，避免覆盖错误状态
                }
                
            } catch (error) {
                console.error('Execution error:', error);
                document.getElementById('status').textContent = 'Error: ' + error.message;
                AndroidBridge.onError(error.toString());
                // 不调用 onComplete，避免覆盖错误状态
            }
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', loadPyodideAndPackages);
    </script>
</body>
</html>
